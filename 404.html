<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — VerrixAI</title>
  <meta name="theme-color" content="#1A3A2A">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F7F6F2; --surface: #FFFFFF; --ink: #1A1A18; --ink-muted: #6B6B62;
      --accent: #1A3A2A; --accent-light: #2E5C42; --gold: #B8963E;
      --border: #E2E0D8; --radius: 12px;
      --shadow: 0 4px 24px rgba(26,26,24,0.08);
      --shadow-lg: 0 12px 48px rgba(26,26,24,0.12);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* NAV */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 48px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .logo { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; color: var(--ink); cursor: pointer; text-decoration: none; }
    .logo span { color: var(--gold); }
    .btn-nav {
      padding: 8px 18px; border-radius: 999px;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
      cursor: pointer; background: var(--accent); color: white;
      border: none; text-decoration: none; transition: background 0.2s;
    }
    .btn-nav:hover { background: var(--accent-light); }
    .btn-nav.outline {
      background: none; color: var(--ink); border: 1px solid var(--border);
    }
    .btn-nav.outline:hover { border-color: var(--ink); background: none; }

    /* MAIN */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
    }
    .error-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 64px 56px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: var(--shadow-lg);
      animation: fadeUp 0.4s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .error-code {
      font-family: 'Playfair Display', serif;
      font-size: 96px;
      font-weight: 600;
      line-height: 1;
      color: var(--accent);
      letter-spacing: -2px;
      margin-bottom: 4px;
    }
    .error-code span { color: var(--gold); }

    .error-divider {
      width: 48px; height: 2px;
      background: var(--gold);
      margin: 20px auto;
      border-radius: 2px;
    }

    .error-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .error-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 500;
      line-height: 1.25;
      margin-bottom: 14px;
      color: var(--ink);
    }

    .error-msg {
      font-size: 15px;
      color: var(--ink-muted);
      line-height: 1.65;
      margin-bottom: 36px;
    }

    .error-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .error-actions a {
      padding: 12px 24px;
      border-radius: 999px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .action-primary {
      background: var(--accent);
      color: white;
      border: 1px solid var(--accent);
    }
    .action-primary:hover { background: var(--accent-light); border-color: var(--accent-light); }
    .action-secondary {
      background: none;
      color: var(--ink);
      border: 1px solid var(--border);
    }
    .action-secondary:hover { border-color: var(--ink); }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: var(--ink-muted);
      flex-wrap: wrap;
      gap: 12px;
    }
    .footer-logo { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 500; color: var(--ink); }
    .footer-logo span { color: var(--gold); }
    .footer-links { display: flex; gap: 20px; }
    .footer-links a { color: var(--ink-muted); text-decoration: none; font-size: 12px; }
    .footer-links a:hover { color: var(--ink); }

    @media (max-width: 600px) {
      nav { padding: 16px 20px; }
      .error-card { padding: 48px 28px; }
      .error-code { font-size: 72px; }
      .error-title { font-size: 22px; }
      footer { flex-direction: column; padding: 24px 20px; text-align: center; }
    }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="/">Verrix<span>AI</span></a>
  <a class="btn-nav" href="/">Go Home</a>
</nav>

<main>
  <div class="error-card">
    <div class="error-code">4<span>0</span>4</div>
    <div class="error-divider"></div>
    <div class="error-label">Page not found</div>
    <h1 class="error-title">This page doesn't exist</h1>
    <p class="error-msg">
      The page you're looking for may have been moved, deleted, or never existed.
      If you followed a link, it may be out of date.
    </p>
    <div class="error-actions">
      <a class="action-primary" href="/">Back to VerrixAI</a>
      <a class="action-secondary" href="mailto:admin@verrixai.com">Contact support</a>
    </div>
  </div>
</main>

<footer>
  <div class="footer-logo">Verrix<span>AI</span></div>
  <div class="footer-links">
    <a href="/privacy.html">Privacy Policy</a>
    <a href="/terms.html">Terms of Service</a>
    <a href="/">Home</a>
  </div>
  <div>&copy; 2026 VerrixAI. Not legal advice.</div>
</footer>

</body>
</html>
